    <style>
        :root {
            --y: #FEE12B;
            --n: #0F172A;
            --w: #FFFFFF;
            --g: #F1F5F9;
            --r: #DC2626;
            --gr: #16A34A;
            --or: #D97706;
            --b: 4px solid #0F172A;
            --sh: 4px 4px 0 0 #0F172A;
            --shl: 6px 6px 0 0 #0F172A;
        }

        [x-cloak] { display: none !important; }
        
        body { 
            background-color: var(--g); 
            color: var(--n); 
            font-family: 'Barlow', sans-serif; 
        }
        
        /* Brutalist UI Rules */
        .brutal-border { border: var(--b); }
        .brutal-shadow { box-shadow: var(--sh); }
        .brutal-shadow-lg { box-shadow: var(--shl); }
        
        .brutal-shadow-hover:hover { 
            transform: translate(-2px, -2px); 
            box-shadow: var(--shl); 
        }

        .brutal-shadow-hover:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 0 #0F172A;
        }
        
        /* Custom Components */
        .btn-y {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--y);
            color: var(--n);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            border: var(--b);
            box-shadow: var(--sh);
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-n {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--n);
            color: var(--w);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            border: var(--b);
            box-shadow: var(--sh);
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-o {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--w);
            color: var(--n);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            border: var(--b);
            box-shadow: var(--sh);
            cursor: pointer;
            transition: all 0.1s;
        }

        /* Industrial Range Slider */
        input[type=range] { 
            -webkit-appearance: none; 
            width: 100%; 
            background: transparent; 
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track { 
            height: 12px; 
            background: #ffffff; 
            border: 3px solid #0f172a; 
        }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            height: 32px; 
            width: 32px; 
            background: #facc15; 
            border: 3px solid #0f172a; 
            margin-top: -12px; 
            cursor: pointer; 
            box-shadow: 4px 4px 0 #0f172a; 
        }

        /* Master Switch Toggle */
        .toggle {
            position: relative;
            width: 52px;
            height: 28px;
            cursor: pointer;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute;
            inset: 0;
            background: #374151;
            border: 2px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .toggle input:checked ~ .toggle-track { background: var(--y); }
        .toggle-thumb {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 16px;
            height: 16px;
            background: var(--w);
            transition: 0.2s;
        }
        .toggle input:checked ~ .toggle-thumb {
            transform: translateX(24px);
            background: var(--n);
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
        .animate-pulse-custom { animation: pulse 2s infinite; }

        .quote-box {
            background: #0F172A;
            padding: 20px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.7;
            color: rgba(255,255,255,0.8);
            white-space: pre-wrap;
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            min-height: 200px;
        }
        .cursor-blink { animation: blink 0.8s infinite; display: inline; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>

                                <div class="brutal-border p-6 bg-slate-50 relative group opacity-50 grayscale">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="text-3xl">📈</div>
                                        <span class="bg-slate-400 text-white px-2 py-1 text-[10px] font-black uppercase">LOCKED</span>
                                    </div>
                                    <h3 class="font-display font-black text-xl uppercase mb-1">SALES AGENT</h3>
                                    <p class="text-xs font-bold text-slate-500 mb-4">Follows up on cold leads.</p>
                                    <button class="w-full py-2 bg-slate-300 text-slate-500 font-black uppercase text-[10px] brutal-border">HIRE AGENT</button>
                                </div>
                            </div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-8">
                            <template x-for="tool in workshopTools" :key="tool.id">
                                <div class="bg-white brutal-border brutal-shadow-sm p-6 hover:brutal-shadow transition-all cursor-pointer">
                                    <div class="text-4xl mb-4" x-text="tool.icon"></div>
                                    <h3 class="font-display font-black text-2xl uppercase mb-2" x-text="tool.name"></h3>
                                    <p class="text-sm font-bold text-slate-500 mb-6" x-text="tool.desc"></p>
                                    <button class="w-full py-3 bg-ink text-white font-black uppercase text-xs brutal-border hover:bg-dewalt hover:text-ink transition-colors">LAUNCH TOOL</button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Sidebar: Stats -->
                    <div class="space-y-8">
                        <div class="bg-dewalt brutal-border brutal-shadow p-8">
                            <h3 class="font-display font-black text-2xl uppercase mb-4">SYSTEM PERFORMANCE</h3>
                            <div class="space-y-4">
                                <div class="flex justify-between items-end">
                                    <span class="text-sm font-black uppercase">Leads Vetted</span>
                                    <span class="text-4xl font-black">142</span>
                                </div>
                                <div class="flex justify-between items-end">
                                    <span class="text-sm font-black uppercase">Time Saved</span>
                                    <span class="text-4xl font-black">18h</span>
                                </div>
                                <div class="w-full bg-white/30 h-4 brutal-border mt-4">
                                    <div class="bg-ink h-full w-[85%]"></div>
                                </div>
                                <p class="text-[10px] font-black uppercase text-center">85% Efficiency Rating</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- BRAND HUB ROUTE -->
    <template x-if="route === '/brand'">
        <div class="min-h-screen bg-slate-50 pt-20">
            <div class="max-w-7xl mx-auto px-4 py-12">
                <h1 class="text-7xl md:text-9xl font-display font-black uppercase leading-none mb-12">BRAND HUB</h1>
                
                <div class="grid lg:grid-cols-2 gap-12">
                    <!-- Editor -->
                    <div class="bg-white brutal-border brutal-shadow p-8">
                        <h2 class="text-4xl font-display font-black uppercase mb-8 border-b-4 border-ink pb-4">PROFILE EDITOR</h2>
                        
                        <div class="space-y-8">
                            <div>
                                <label class="block text-xl font-display font-black uppercase mb-4">Brand Color</label>
                                <div class="flex gap-4">
                                    <template x-for="color in ['#facc15', '#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#000000']">
                                        <button @click="brandColor = color" :style="`background-color: ${color}`" :class="brandColor === color ? 'scale-110 brutal-border-4' : 'brutal-border'" class="w-12 h-12 transition-all"></button>
                                    </template>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xl font-display font-black uppercase mb-4">Business Bio</label>
                                <textarea x-model="brandBio" class="w-full brutal-border p-4 font-body font-bold text-lg focus:ring-0 focus:border-dewalt" rows="4"></textarea>
                            </div>

                            <button @click="toast('✓ Brand profile updated.'); navigate('/dashboard')" class="btn-y w-full text-2xl py-4 brutal-shadow">SAVE BRAND PROFILE</button>
                        </div>
                    </div>

                    <!-- Live Preview -->
                    <div>
                        <h2 class="text-2xl font-display font-black uppercase mb-6 text-slate-400">LIVE PREVIEW (CUSTOMER VIEW)</h2>
                        <div class="bg-white brutal-border brutal-shadow-lg overflow-hidden">
                            <div :style="`background-color: ${brandColor}`" class="h-32 brutal-border-b flex items-center justify-center">
                                <div class="w-20 h-20 bg-white brutal-border flex items-center justify-center text-4xl font-black">LOGO</div>
                            </div>
                            <div class="p-8">
                                <h3 class="text-4xl font-display font-black uppercase mb-4" x-text="registerCompany || 'Your Company'"></h3>
                                <div class="flex gap-1 mb-6">
                                    <template x-for="i in 5">
                                        <span class="text-dewalt text-2xl">★</span>
                                    </template>
                                    <span class="ml-2 font-black uppercase text-sm self-center">4.9 (142 Reviews)</span>
                                </div>
                                <p class="font-body font-bold text-xl text-slate-600 mb-8" x-text="brandBio"></p>
                                
                                <div class="space-y-4">
                                    <button class="w-full py-4 text-white font-black uppercase text-xl brutal-border brutal-shadow-sm" :style="`background-color: ${brandColor === '#000000' ? '#333' : 'black'}`">BOOK A QUOTE</button>
                                    <button class="w-full py-4 bg-white text-ink font-black uppercase text-xl brutal-border">VIEW GALLERY</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Footer -->
    <footer class="bg-white py-16">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
            <p class="font-display font-black uppercase text-3xl">BUILT IN BIRMINGHAM FOR THE UK TRADE.</p>
            
            <div class="flex gap-8 font-display font-black uppercase text-2xl">
                <button @click="showModal = 'privacy'" class="hover:bg-dewalt px-2 transition-colors">PRIVACY</button>
                <button @click="showModal = 'terms'" class="hover:bg-dewalt px-2 transition-colors">TERMS</button>
            </div>
        </div>
    </footer>

    <!-- Alpine.js Modals -->
    <div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-ink/90 p-4" x-cloak>
        <div @click.away="showModal = null" class="bg-white brutal-border brutal-shadow p-12 max-w-3xl w-full relative">
            
            <button @click="showModal = null" class="absolute top-6 right-6 brutal-border bg-white hover:bg-red-600 hover:text-white transition-colors w-16 h-16 flex items-center justify-center brutal-shadow text-4xl font-black">
                X
            </button>
            
            <h3 class="text-6xl font-display font-black uppercase mb-10 border-b-4 border-ink pb-6" x-text="showModal === 'privacy' ? 'PRIVACY POLICY' : 'TERMS OF SERVICE'"></h3>
            
            <div class="font-body font-bold text-3xl leading-relaxed text-ink">
                <template x-if="showModal === 'privacy'">
                    <p>JobFilter.uk (“we”, “our”, “us”) is committed to protecting your privacy. Our service is designed to process communications and job-related data on your behalf in order to qualify leads and filter opportunities. We do not act as a recruiter, employer, or decision-maker in any hiring process.

We may process basic information such as contact details, message content, and interactions with the service. This data is used strictly to operate, improve, and deliver the core functionality of JobFilter.uk. We do not sell, rent, or trade your data, and we do not use it for advertising purposes.

You remain the owner of your data at all times. JobFilter.uk acts solely as a processor, meaning we handle data only under your direction and for the purpose of delivering the service. You are in control of what is submitted and may request deletion at any time.

We do not share data with third parties except where necessary to run the service (such as infrastructure providers) or where required by law. We take reasonable steps to protect data, but no system can be guaranteed to be completely secure.

By using JobFilter.uk, you acknowledge that you are responsible for ensuring that any data you provide has been collected and processed in accordance with applicable laws, including data protection regulations where relevant.

JobFilter.uk provides tools for filtering and automation only. We do not guarantee results, lead quality, or business outcomes, and we are not responsible for decisions made based on the use of our service or for any indirect or consequential losses.

We may update this policy from time to time, and continued use of the service indicates acceptance of any changes.

For any privacy-related requests, please contact: [Insert Email]</p>
                </template>
                <template x-if="showModal === 'terms'">
                    <p>JobFilter is a filtering tool, not a marketplace. We help qualify incoming requests, but all final pricing and agreements remain your responsibility.</p>
                </template>
            </div>
        </div>
    </div>

</body>
</html>
