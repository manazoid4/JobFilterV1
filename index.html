    <script>
      // Stealth Mode: The Bouncer
      const SECRET_KEY = "jew"; // Change this to whatever you want
      
      if (localStorage.getItem('authorized_filter') !== 'true') {
          document.addEventListener("DOMContentLoaded", () => {
              // Hide the main app content
              document.body.style.display = 'none';
              
              // Create the bouncer overlay
              const overlay = document.createElement('div');
              overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:#facc15;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:20px;';
              overlay.innerHTML = `
                  <h1 style='font-size:2rem;font-weight:900;text-transform:uppercase;color:#0f172a;margin-bottom:20px;'>JobFilter Stealth Mode</h1>
                  <input type='password' id='stealth-password' placeholder='Enter Access Code' style='padding:10px;font-size:1.2rem;border:4px solid #0f172a;margin-bottom:20px;text-align:center;outline:none;' />
                  <button id='stealth-submit' style='background:#0f172a;color:#fff;padding:10px 20px;font-size:1.2rem;font-weight:bold;border:none;cursor:pointer;text-transform:uppercase;box-shadow:4px 4px 0 #fff;'>Enter</button>
                  <p id='stealth-error' style='color:#d93025;font-weight:bold;margin-top:20px;display:none;font-size:1.5rem;text-transform:uppercase;'>ACCESS DENIED. THE CLAW IS CLOSED.</p>
              `;
              document.documentElement.appendChild(overlay);

              const checkPassword = () => {
                  if (document.getElementById('stealth-password').value === SECRET_KEY) {
                      localStorage.setItem('authorized_filter', 'true');
                      overlay.remove();
                      document.body.style.display = '';
                  } else {
                      document.getElementById('stealth-error').style.display = 'block';
                  }
              };

              document.getElementById('stealth-submit').addEventListener('click', checkPassword);
              document.getElementById('stealth-password').addEventListener('keypress', (e) => {
                  if (e.key === 'Enter') checkPassword();
              });
          });
      }
    </script>

                            <button @click="closeLead()" class="w-full bg-ink text-white font-display font-extrabold uppercase px-8 py-6 text-3xl md:text-4xl brutal-border brutal-shadow brutal-shadow-hover hover:bg-slate-800 transition-all">
                                ACCEPT & REVEAL NUMBER
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- BLUEPRINT ROUTE -->
    <template x-if="route === '/blueprint'">
        <div class="min-h-screen bg-slate-50 py-12 px-4">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-6xl font-display font-black uppercase tracking-tighter">THE BLUEPRINT</h1>
                    <button @click="navigate('/')" class="bg-ink text-white px-6 py-3 font-display font-bold text-xl brutal-border hover:bg-slate-800 transition-colors">BACK TO SITE</button>
                </div>
                
                <div class="bg-white brutal-border brutal-shadow p-8 mb-12">
                    <h2 class="text-3xl font-display font-black uppercase mb-2">CEO VISION BOARD</h2>
                    <p class="text-slate-500 font-body font-bold mb-6">Public roadmap and feature dump. No password required.</p>
                    <form @submit.prevent="addVaultIdea" class="flex flex-col md:flex-row gap-4">
                        <input type="text" x-model="newVaultIdea" class="flex-1 brutal-border p-4 font-body font-bold text-xl focus:outline-none focus:ring-4 focus:ring-dewalt" placeholder="e.g. Material Fetcher AI...">
                        <select x-model="newVaultPhase" class="brutal-border p-4 font-body font-bold text-xl focus:outline-none focus:ring-4 focus:ring-dewalt bg-white">
                            <option value="1">PHASE 1</option>
                            <option value="2">PHASE 2</option>
                            <option value="3">PHASE 3</option>
                        </select>
                        <button type="submit" class="bg-dewalt text-ink font-display font-black uppercase px-8 py-4 text-2xl brutal-border brutal-shadow brutal-shadow-hover transition-all whitespace-nowrap">LOG IDEA</button>
                    </form>
                </div>

                <div class="space-y-6">
                    <h3 class="text-4xl font-display font-black uppercase mb-6 border-b-4 border-ink pb-2">THE BACKLOG</h3>
                    
                    <!-- AI Generated Features -->
                    <div class="bg-white brutal-border p-6 flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div>
                            <span class="font-display font-black text-2xl uppercase block mb-1">VAT Sort</span>
                            <span class="font-body font-bold text-slate-600">Automated receipt extraction and categorization for HMRC.</span>
                        </div>
                        <span class="bg-black text-[#FFD700] font-bold px-3 py-1 text-sm uppercase brutal-border whitespace-nowrap">[PHASE 1: LIVE]</span>
                    </div>
                    
                    <div class="bg-white brutal-border p-6 flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div>
                            <span class="font-display font-black text-2xl uppercase block mb-1">Tool Tracker</span>
                            <span class="font-body font-bold text-slate-600">Inventory management synced with van locations.</span>
                        </div>
                        <span class="bg-[#FFD700] text-black font-bold px-3 py-1 text-sm uppercase brutal-border whitespace-nowrap">[PHASE 2: NEAR-TERM]</span>
                    </div>
                    
                    <div class="bg-white brutal-border p-6 flex flex-col md:flex-row justify-between md:items-center gap-4">
                        <div>
                            <span class="font-display font-black text-2xl uppercase block mb-1">Subbie-Net</span>
                            <span class="font-body font-bold text-slate-600">AI-matched subcontractor hiring for overflow work.</span>
                        </div>
                        <span class="bg-slate-200 text-black font-bold px-3 py-1 text-sm uppercase brutal-border whitespace-nowrap">[PHASE 3: FUTURE]</span>
                    </div>

                    <!-- Dynamic Ideas from PostgreSQL -->
                    <template x-for="idea in vaultIdeas" :key="idea.id">
                        <div class="bg-white brutal-border p-6 flex flex-col md:flex-row justify-between md:items-center gap-4">
                            <div>
                                <span class="font-display font-black text-2xl uppercase block mb-1" x-text="idea.text"></span>
                                <span class="font-body font-bold text-slate-600" x-text="new Date(idea.created_at || idea.createdAt).toLocaleDateString()"></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span :class="{
                                    'bg-black text-[#FFD700]': idea.phase == 1,
                                    'bg-[#FFD700] text-black': idea.phase == 2,
                                    'bg-slate-200 text-black': idea.phase == 3 || !idea.phase
                                }" class="font-bold px-3 py-1 text-sm uppercase brutal-border whitespace-nowrap" x-text="idea.phase == 1 ? '[PHASE 1: LIVE]' : idea.phase == 2 ? '[PHASE 2: NEAR-TERM]' : '[PHASE 3: FUTURE]'"></span>
                                <button @click="deleteVaultIdea(idea.id)" class="bg-white text-black hover:bg-black hover:text-white font-bold px-3 py-1 text-sm uppercase brutal-border whitespace-nowrap transition-colors">
                                    REMOVE
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- ONBOARDING ROUTE -->
    <template x-if="route === '/onboarding'">
        <div class="min-h-screen bg-slate-50 py-12 px-4 flex justify-center items-start">
            <div class="max-w-5xl w-full flex flex-col lg:flex-row gap-8 mt-8">
                
                <!-- Main Form Area -->
                <div class="bg-white brutal-border brutal-shadow p-8 md:p-12 flex-1">
                    <div class="flex justify-between items-center mb-8 border-b-4 border-ink pb-4">
                        <h1 class="text-4xl md:text-5xl font-display font-black uppercase tracking-tighter">ACTIVATE YOUR SYSTEM</h1>
                        <span class="text-xl font-display font-bold bg-dewalt px-3 py-1 brutal-border whitespace-nowrap" x-text="'STEP ' + onboardingStep + '/3'"></span>
                    </div>
                    
                    <form @submit.prevent="onboardingStep === 3 ? register() : nextOnboardingStep()" class="space-y-8">
                        
                        <!-- STEP 1: PROFILE -->
                        <div x-show="onboardingStep === 1">
                            <p class="text-2xl font-body font-bold text-ink mb-8">Let's get your basic details.</p>
                            <div class="space-y-6">
                                <div>
                                    <label class="block font-display font-black text-2xl uppercase mb-2">FULL NAME</label>
                                    <input type="text" x-model="registerName" placeholder="John Doe" class="w-full brutal-border p-4 text-xl font-body font-bold focus:outline-none focus:ring-4 focus:ring-dewalt" :required="onboardingStep === 1">
                                </div>
                                <div>
                                    <label class="block font-display font-black text-2xl uppercase mb-2">TRADE</label>
                                    <input type="text" x-model="registerTrade" placeholder="Plumber, Electrician, etc." class="w-full brutal-border p-4 text-xl font-body font-bold focus:outline-none focus:ring-4 focus:ring-dewalt" :required="onboardingStep === 1">
                                </div>
                                <div>
                                    <label class="block font-display font-black text-2xl uppercase mb-2">MOBILE NUMBER</label>
                                    <input type="tel" x-model="phoneNumber" pattern="^07\d{9}$" maxlength="11" title="Please enter a valid UK mobile number starting with 07" placeholder="07700900000" class="w-full brutal-border p-4 text-xl font-body font-bold focus:outline-none focus:ring-4 focus:ring-dewalt" :required="onboardingStep === 1" @input="phoneNumber = phoneNumber.replace(/[^0-9]/g, '')">
                                    <p class="text-sm text-slate-500 mt-2 font-bold">UK format starting with 07. No spaces.</p>
                                </div>
                            </div>
                        </div>

                        <!-- STEP 2: LOGIC & FEES -->
                        <div x-show="onboardingStep === 2" style="display: none;">
                            <p class="text-2xl font-body font-bold text-ink mb-8">Set your AI Foreman's rules.</p>
                            <div class="space-y-10">
                                <div>
                                    <label class="block font-display font-black text-2xl uppercase mb-2">PRIORITY BOOKING DEPOSIT (£)</label>
                                    <p class="text-slate-600 font-body font-bold mb-4">We use a small, fully-deductible deposit to filter out time-wasters. What's a fair amount for your trade?</p>
                                    <input type="number" x-model="calloutFee" class="w-full brutal-border p-4 text-xl font-body font-bold focus:outline-none focus:ring-4 focus:ring-dewalt" :required="onboardingStep === 2">
                                </div>
                                <div>
                                    <label class="block font-display font-black text-2xl uppercase mb-2">AI FILTERING LEVEL</label>
                                    <p class="text-slate-600 font-body font-bold mb-4">How aggressively should we filter your leads? You'll save hours, but we won't scare off good customers.</p>
                                    <div class="flex items-center gap-4 mb-2">
                                        <input type="range" min="1" max="5" x-model="filterStrictness" class="w-full h-4 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-ink">
                                        <span class="text-3xl font-display font-black w-8 text-center" x-text="filterStrictness"></span>
                                    </div>
                                    <div class="flex justify-between text-sm font-bold text-slate-500">
                                        <span>Light Touch</span>
                                        <span>Balanced</span>
                                        <span>Maximum Shield</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- STEP 3: DEPLOYMENT -->
                        <div x-show="onboardingStep === 3" style="display: none;">
                            <p class="text-2xl font-body font-bold text-ink mb-8">Deploy your Foreman.</p>
                            <div class="space-y-8">
                                <div class="border-4 border-ink p-6 bg-slate-50 flex flex-col md:flex-row items-center gap-6">
                                    <div class="flex-shrink-0 text-center">
                                        <h3 class="font-display font-black text-xl uppercase mb-2">VAN STICKER QR</h3>
                                        <img :src="'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/447000000000?text=Hi%20I%20need%20a%20quote'" alt="QR Code" class="w-32 h-32 border-4 border-ink mx-auto mb-2">
                                        <button type="button" class="text-sm font-bold underline hover:text-dewalt">Download Sticker</button>
                                    </div>
                                    <div>
                                        <p class="font-body font-bold text-lg mb-2">Stick this on your van to get enquiries directly into your AI funnel.</p>
                                        <p class="text-sm text-slate-500 font-bold">Customers scan it and answer a few questions via WhatsApp.</p>
                                    </div>
                                </div>
                                <div class="border-4 border-ink p-6 bg-slate-50">
                                    <h3 class="font-display font-black text-2xl uppercase mb-2">MANUAL PULSE SCHEDULE</h3>
                                    <p class="font-body font-bold text-slate-600 mb-4">How often should we ping you via WhatsApp to check your availability? We only send jobs when you're free.</p>
                                    <div class="grid grid-cols-3 gap-2">
                                        <button type="button" @click="pulseSchedule = 'daily'" :class="pulseSchedule === 'daily' ? 'bg-ink text-white' : 'bg-white text-ink'" class="brutal-border py-3 font-bold uppercase transition-colors">Daily</button>
                                        <button type="button" @click="pulseSchedule = '3days'" :class="pulseSchedule === '3days' ? 'bg-ink text-white' : 'bg-white text-ink'" class="brutal-border py-3 font-bold uppercase transition-colors">3 Days</button>
                                        <button type="button" @click="pulseSchedule = 'weekly'" :class="pulseSchedule === 'weekly' ? 'bg-ink text-white' : 'bg-white text-ink'" class="brutal-border py-3 font-bold uppercase transition-colors">Weekly</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <p class="text-red-600 font-bold mt-4 text-xl" x-show="loginError" x-text="loginError"></p>

                        <div class="flex gap-4 pt-8">
                            <button type="button" x-show="onboardingStep > 1" @click="onboardingStep--" class="w-1/3 bg-slate-200 text-ink brutal-border font-display font-black uppercase px-4 py-4 text-2xl hover:bg-slate-300 transition-colors">
                                BACK
                            </button>
                            <div class="flex-1 flex flex-col">
                                <button type="submit" :disabled="isLoggingIn" class="w-full bg-dewalt text-ink brutal-border font-display font-black uppercase px-8 py-4 text-3xl brutal-shadow brutal-shadow-hover transition-all disabled:opacity-50">
                                    <span x-show="onboardingStep < 3">NEXT</span>
                                    <span x-show="onboardingStep === 3 && !isLoggingIn">GO LIVE & START GETTING JOBS</span>
                                    <span x-show="isLoggingIn">ACTIVATING...</span>
                                </button>
                                <span x-show="onboardingStep === 3" class="text-center text-sm font-bold text-slate-500 mt-2">Takes 10 seconds. You could get your first job today.</span>
                            </div>
                        </div>
                    </form>

                    <div class="mt-12 pt-8 border-t-4 border-slate-200">
                        <button type="button" @click="navigate('/dashboard')" class="w-full bg-slate-200 text-slate-500 brutal-border font-display font-black uppercase px-4 py-3 text-2xl hover:bg-slate-300 hover:text-ink transition-colors">
                            [TESTING] BYPASS ONBOARDING
                        </button>
                    </div>
                </div>

                <!-- Trust / Info Sidebar -->
                <div class="w-full lg:w-80 space-y-6">
                    <!-- Trust Badge -->
                    <div class="bg-ink text-white brutal-border p-6">
                        <h3 class="font-display font-black text-xl uppercase mb-3 text-dewalt">EARLY ACCESS</h3>
                        <p class="font-body font-bold text-sm mb-2">New platform. Built properly from day one.</p>
                        <p class="font-body font-bold text-sm mb-2">Limited to the first 50 trades.</p>
                        <p class="font-body font-bold text-sm text-green-400">No subscriptions during early access.</p>
                    </div>

                    <!-- What happens next -->
                    <div class="bg-white brutal-border p-6">
                        <h3 class="font-display font-black text-xl uppercase mb-4 border-b-2 border-ink pb-2">WHAT HAPPENS NEXT?</h3>
                        <ul class="space-y-3 font-body font-bold text-sm">
                            <li class="flex gap-2"><span>1.</span> Your QR goes live instantly.</li>
                            <li class="flex gap-2"><span>2.</span> Customers scan & answer questions.</li>
                            <li class="flex gap-2"><span>3.</span> You only get serious job enquiries via WhatsApp.</li>
                        </ul>
                    </div>

                    <!-- You stay in control -->
                    <div class="bg-white brutal-border p-6">
                        <h3 class="font-display font-black text-xl uppercase mb-4 border-b-2 border-ink pb-2">YOU STAY IN CONTROL</h3>
                        <ul class="space-y-3 font-body font-bold text-sm">
                            <li class="flex gap-2"><span>⏸️</span> Pause leads anytime from WhatsApp.</li>
                            <li class="flex gap-2"><span>🗓️</span> Change availability whenever.</li>
                            <li class="flex gap-2"><span>👁️</span> See exactly what the customer submits before replying.</li>
                            <li class="flex gap-2"><span>📄</span> No contracts. No pressure.</li>
                        </ul>
                    </div>

                    <!-- Example Lead -->
                    <div class="bg-slate-100 brutal-border p-4">
                        <p class="text-xs font-bold text-slate-500 uppercase mb-2">Example WhatsApp Lead</p>
                        <div class="bg-white p-3 rounded-lg rounded-tl-none border-2 border-slate-300 font-body text-sm">
                            "John – Boiler repair – Budget £120 – Ready this week. 📸 2 photos attached."
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Footer -->
    <footer class="bg-white py-16">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
            <p class="font-display font-black uppercase text-3xl">BUILT IN BIRMINGHAM FOR THE UK TRADE.</p>
            
            <div class="flex gap-8 font-display font-black uppercase text-2xl">
                <button @click="showModal = 'privacy'" class="hover:bg-dewalt px-2 transition-colors">PRIVACY</button>
                <button @click="showModal = 'terms'" class="hover:bg-dewalt px-2 transition-colors">TERMS</button>
            </div>
        </div>
    </footer>

    <!-- Alpine.js Modals -->
    <div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-ink/90 p-4" x-cloak>
        <div @click.away="showModal = null" class="bg-white brutal-border brutal-shadow p-12 max-w-3xl w-full relative">
            
            <button @click="showModal = null" class="absolute top-6 right-6 brutal-border bg-white hover:bg-red-600 hover:text-white transition-colors w-16 h-16 flex items-center justify-center brutal-shadow text-4xl font-black">
                X
            </button>
            
            <h3 class="text-6xl font-display font-black uppercase mb-10 border-b-4 border-ink pb-6" x-text="showModal === 'privacy' ? 'PRIVACY POLICY' : 'TERMS OF SERVICE'"></h3>
            
            <div class="font-body font-bold text-3xl leading-relaxed text-ink">
                <template x-if="showModal === 'privacy'">
                    <p>We don’t sell your data. We don’t auction your jobs. JobFilter processes messages strictly to qualify leads on your behalf. You stay in control.</p>
                </template>
                <template x-if="showModal === 'terms'">
                    <p>JobFilter is a filtering tool, not a marketplace. We help qualify incoming requests, but all final pricing and agreements remain your responsibility.</p>
                </template>
            </div>
        </div>
    </div>

</body>
</html>
