    <script>
      // Stealth Mode: The Bouncer
      const SECRET_KEY = "jew"; // Change this to whatever you want
      
      if (localStorage.getItem('authorized_filter') !== 'true') {
          document.addEventListener("DOMContentLoaded", () => {
              // Hide the main app content
              document.body.style.display = 'none';
              
              // Create the bouncer overlay
              const overlay = document.createElement('div');
              overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:#FEBD17;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;text-align:center;padding:20px;';
              overlay.innerHTML = `
                  <h1 style='font-size:2rem;font-weight:900;text-transform:uppercase;color:#111111;margin-bottom:20px;letter-spacing:0.05em;'>JobFilter Stealth Mode</h1>
                  <input type='password' id='stealth-password' placeholder='Enter Access Code' style='padding:10px;font-size:1.2rem;border:4px solid #111111;margin-bottom:20px;text-align:center;outline:none;' />
                  <button id='stealth-submit' style='background:#111111;color:#fff;padding:10px 20px;font-size:1.2rem;font-weight:bold;border:none;cursor:pointer;text-transform:uppercase;box-shadow:4px 4px 0 rgba(0,0,0,0.3);'>Enter</button>
                  <p id='stealth-error' style='color:#c0392b;font-weight:bold;margin-top:20px;display:none;font-size:1.5rem;text-transform:uppercase;'>ACCESS DENIED. THE CLAW IS CLOSED.</p>
              `;
              document.documentElement.appendChild(overlay);

              const checkPassword = () => {
                  if (document.getElementById('stealth-password').value === SECRET_KEY) {
                      localStorage.setItem('authorized_filter', 'true');
                      overlay.remove();
                      document.body.style.display = '';
                  } else {
                      document.getElementById('stealth-error').style.display = 'block';
                  }
              };

              document.getElementById('stealth-submit').addEventListener('click', checkPassword);
              document.getElementById('stealth-password').addEventListener('keypress', (e) => {
                  if (e.key === 'Enter') checkPassword();
              });
          });
      }
    </script>

                    <p class="text-red-600 font-bold mt-4 text-xl" x-show="loginError" x-text="loginError"></p>

                    <div class="flex gap-4 pt-8">
                        <button type="button" x-show="onboardingStep > 1" @click="onboardingStep--" class="w-1/3 bg-slate-200 text-ink brutal-border font-display font-black uppercase px-4 py-4 text-2xl hover:bg-slate-300 transition-colors">
                            BACK
                        </button>
                        <button type="submit" :disabled="isLoggingIn" class="flex-1 bg-dewalt text-ink brutal-border font-display font-black uppercase px-8 py-4 text-3xl brutal-shadow brutal-shadow-hover transition-all disabled:opacity-50">
                            <span x-show="onboardingStep < 3">NEXT</span>
                            <span x-show="onboardingStep === 3 && !isLoggingIn">FINISH & LAUNCH</span>
                            <span x-show="isLoggingIn">CREATING...</span>
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </template>

    <!-- Footer -->
    <footer class="bg-white py-16">
        <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
            <p class="font-display font-black uppercase text-3xl">BUILT IN BIRMINGHAM FOR THE UK TRADE.</p>
            
            <div class="flex gap-8 font-display font-black uppercase text-2xl">
                <button @click="showModal = 'privacy'" class="hover:bg-dewalt px-2 transition-colors">PRIVACY</button>
                <button @click="showModal = 'terms'" class="hover:bg-dewalt px-2 transition-colors">TERMS</button>
            </div>
        </div>
    </footer>

    <!-- Alpine.js Modals -->
    <div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-ink/90 p-4" x-cloak>
        <div @click.away="showModal = null" class="bg-white brutal-border brutal-shadow p-12 max-w-3xl w-full relative">
            
            <button @click="showModal = null" class="absolute top-6 right-6 brutal-border bg-white hover:bg-red-600 hover:text-white transition-colors w-16 h-16 flex items-center justify-center brutal-shadow text-4xl font-black">
                X
            </button>
            
            <h3 class="text-6xl font-display font-black uppercase mb-10 border-b-4 border-ink pb-6" x-text="showModal === 'privacy' ? 'PRIVACY POLICY' : 'TERMS OF SERVICE'"></h3>
            
            <div class="font-body font-bold text-3xl leading-relaxed text-ink">
                <template x-if="showModal === 'privacy'">
                    <p>We don’t sell your data. We don’t auction your jobs. JobFilter processes messages strictly to qualify leads on your behalf. You stay in control.</p>
                </template>
                <template x-if="showModal === 'terms'">
                    <p>JobFilter is a filtering tool, not a marketplace. We help qualify incoming requests, but all final pricing and agreements remain your responsibility.</p>
                </template>
            </div>
        </div>
    </div>

</body>
</html>
