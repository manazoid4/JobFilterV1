<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobFilter | CONTROL THE JOBS</title>
    <meta
      name="description"
      content="ENTER THE INTAKE. Find REAL LEADS by postcode. NO CHASING. NO COMPETING. BUILT FOR TRADES."
    />
    <meta name="theme-color" content="#f59e0b" />
    <style>
      body { margin: 0; background: #020617; color: #e2e8f0; font-family: Inter, system-ui, -apple-system, sans-serif; }
      .shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { width: 100%; max-width: 520px; border: 1px solid #1e293b; border-radius: 14px; padding: 20px; background: #0b1120; }
      .kicker { font-size: 11px; color: #f59e0b; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; margin: 0 0 8px; }
      .sub { color: #94a3b8; margin: 0 0 12px; }
      .input { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #f8fafc; box-sizing: border-box; }
      .loading { margin-top: 10px; color: #fbbf24; font-size: 13px; }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="shell" aria-live="polite">
        <section class="card">
          <p class="kicker">ENTER THE INTAKE</p>
          <h1>CONTROL THE JOBS</h1>
          <p class="sub">REAL LEADS. NO CHASING. NO COMPETING. BUILT FOR TRADES.</p>
          <input class="input" type="text" placeholder="Postcode (e.g. B1 1AA)" autocomplete="postal-code" />
          <p class="loading">Loading your intake… STAY IN CONTROL.</p>
        </section>
      </main>
      <noscript>
        <main class="shell">
          <section class="card">
            <p class="kicker">NO CHASING</p>
            <p class="sub">JavaScript is off. Turn it on to scan live jobs.</p>
          </section>
        </main>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
