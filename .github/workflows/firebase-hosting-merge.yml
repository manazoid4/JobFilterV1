name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Prepare functions
        run: cp -r leadEngine functions/
      - name: Install function dependencies
        run: npm install --prefix functions
      - name: Build functions
        run: npx tsc -p functions/tsconfig.json
      - name: Write service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JOBFILTER_UK }}' > /tmp/sa.json
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --project jobfilter-uk
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
