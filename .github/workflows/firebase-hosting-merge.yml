name: Deploy to Firebase Hosting + Functions on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build

      - name: Build Functions
        run: npx tsc -p functions/tsconfig.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JOBFILTER_UK }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Cloud Billing API is enabled
        run: gcloud services enable cloudbilling.googleapis.com --project jobfilter-uk

      - name: Deploy Functions and Hosting
        run: npx firebase-tools deploy --only functions,hosting --project jobfilter-uk
