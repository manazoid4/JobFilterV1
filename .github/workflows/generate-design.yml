name: Generate DESIGN.md

on:
  push:
    branches: [main]
    paths:
      - 'src/index.css'
      - 'src/components/TopNav.tsx'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Write DESIGN.md
        run: |
          cat > DESIGN.md << 'MDEOF'
          # JobFilter Design System — V3

          > Auto-generated. Edit tokens in `src/index.css`, not here.

          ---

          ## Colour Tokens

          | Token | Hex | Use |
          |---|---|---|
          | `--navy` | `#0E1A2B` | Primary bg, borders, text |
          | `--navy-2` | `#142336` | Panel bg on dark sections |
          | `--navy-3` | `#1c3149` | Input bg on dark sections |
          | `--paper` | `#ffffff` | Default section background |
          | `--offwhite` | `#F5F4EF` | Alternating section background |
          | `--rule` | `#E6E4DD` | Dividers |
          | `--rule-2` | `#D6D3CA` | Subtle dividers |
          | `--muted` | `#5E6A78` | Secondary text |
          | `--muted-2` | `#8A95A2` | Tertiary / disabled text |
          | `--yellow` | `#F8D31A` | PRIMARY ACCENT — CTAs, highlights, drop shadows |
          | `--yellow-2` | `#FFDC36` | Yellow hover state |
          | `--red` | `#C84A3C` | Error / rejected |
          | `--green` | `#2C8A52` | Success / approved |

          **Rule:** Yellow is the only accent. One or two elements per section max.

          ---

          ## Typography

          | Role | Font | Size | Weight |
          |---|---|---|---|
          | H1 Display | Barlow Condensed | clamp(44px, 7vw, 92px) | 800, uppercase |
          | H2 Section | Barlow Condensed | clamp(28px, 3.6vw, 42px) | 700, uppercase |
          | H3 Card | Barlow | 18px | 600 |
          | Body | Barlow | 16px | 400, line-height 1.6 |
          | Lead | Barlow | 17px | 500, line-height 1.55 |
          | Label | Barlow Condensed | 12px | 700, uppercase, 0.14em tracking |
          | Mono | JetBrains Mono | varies | 600–700 |

          Google Fonts: `Barlow Condensed:500,600,700,800,900` · `Barlow:400,500,600,700,800` · `JetBrains Mono:400,500,700`

          ---

          ## Borders & Shadows

          | Component | Border | Shadow |
          |---|---|---|
          | Card / panel | `2px solid var(--navy)`, radius 4px | `8px 8px 0 var(--yellow)` |
          | Button | `2px solid var(--navy)`, radius 3px | `4px 4px 0 var(--navy)` |
          | Nav | `border-bottom: 2px solid var(--navy)` | none |

          ---

          ## Buttons

          | Class | Bg | Shadow |
          |---|---|---|
          | `.jf-button` (primary) | `var(--yellow)` | `4px 4px 0 var(--navy)` |
          | `.jf-button` (ghost) | `var(--paper)` | `4px 4px 0 var(--navy)` |
          | `.jf-button-lg` | same + padding `14px 26px` | same |

          Hover: `translate(-1px, -1px)` + shadow expands 1px. Active: `translate(1px, 1px)` + shadow shrinks 2px.

          ---

          ## Page Structure (canonical V3 order)

          | # | Section | ID | Background |
          |---|---|---|---|
          | 1 | Founding 30 banner | — | yellow |
          | 2 | Nav sticky | — | paper |
          | 3 | Hero — pain headline + CTA | — | paper |
          | 4 | Why JobFilter — bad/good split | `#why` | offwhite |
          | 5 | What We Do — product stack | `#what` | paper |
          | 6 | How It Works — 3 steps | `#how` | offwhite |
          | 7 | Free Tools grid | `#tools` | paper |
          | 8 | Pricing callout | `#pricing` | navy |
          | 9 | Waitlist CTA | — | paper |

          ---

          ## Nav

          ```
          Why JobFilter | What We Do | Free Tools | For Your Trade | News | Pricing | [Join the Waitlist →]
          ```

          Collapses to hamburger at `xl` breakpoint (1280px).

          ---

          ## Key Copy

          | Slot | Copy |
          |---|---|
          | Hero H1 | "Stop quoting for tyre-kickers." |
          | Primary CTA | "See the Intake Engine →" |
          | Quiet CTA | "Or try the free tools →" |
          | Banner | "Founding 30: first 30 tradesmen lock £22/mo forever." |
          | Core price | £49/mo |
          | Founding price | £22/mo locked |

          **Allowed:** tyre-kickers · cowboys · race to the bottom · on the tools · your evenings back
          **Banned:** optimise · synergize · empower · lead generation · omnichannel
          MDEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DESIGN.md
          git diff --staged --quiet || git commit -m "docs: auto-update DESIGN.md [skip ci]"
          git push
